<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">TechStore Admin</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">View Shop</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">Add New Product</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="admin-alert" class="alert d-none"></div>

                        <form id="add-product-form">
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" id="name" class="form-control" required placeholder="e.g. Sony Headphones">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" id="price" step="0.01" class="form-control" required placeholder="0.00">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea id="description" class="form-control" rows="3" required placeholder="Enter product details..."></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Category</label>
                                    <select id="categorySelect" class="form-select" required>
                                        <option value="">Loading categories...</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Stock Quantity</label>
                                    <input type="number" id="stock" class="form-control" required placeholder="e.g. 50">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Image URL</label>
                                <input type="text" id="imageUrl" class="form-control" placeholder="Paste image link here">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-5">Save Product</button>
                                <a href="index.html" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
