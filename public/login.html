<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">TechStore</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Login</h2>
                        
                        <!-- Error Alert (hidden by default) -->
                        <div id="error-alert" class="alert alert-danger d-none"></div>

                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <p class="small">Don't have an account? <a href="register.html">Register</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
