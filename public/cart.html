<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">TechStore</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Back to Shop</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Shopping Cart</h2>
        
        <div class="row">
            <!-- Cart Items List -->
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div id="cart-items-container">
                            <!-- Items injected by JS -->
                            <p class="text-center py-5">Loading your cart...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <strong>Total</strong>
                            <strong id="total" class="text-primary">$0.00</strong>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Shipping Address</label>
                            <textarea id="shipping-address" class="form-control" rows="2" placeholder="Street, City, State, Zip"></textarea>
                        </div>
                        <button id="checkout-btn" class="btn btn-primary w-100 py-2">Proceed to Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/cart.js"></script>
</body>
</html>
