<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">TechStore</a>
            
            <!-- Hamburger Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                data-bs-target="#navbarNav" aria-controls="navbarNav" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu Container (Fixed: Only ONE ID here) -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Shop</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">Cart <span id="cart-count" class="badge bg-primary">0</span></a>
                    </li>
                    
                    <!-- This will be modified by checkAuth() in main.js -->
                    <li id="auth-buttons" class="nav-item ms-lg-2">
                        <a class="nav-link btn btn-primary text-white" href="login.html">Login</a>
                    </li>

                    <!-- This will show only for Admins via main.js -->
                    <li id="admin-link" class="nav-item d-none">
                        <a class="nav-link text-danger fw-bold" href="admin.html">Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1 class="display-4 fw-bold">Welcome to TechStore</h1>
            <p class="lead">Discover the latest gadgets and electronics.</p>
        </div>
    </header>

    <!-- Product Grid -->
    <main class="container my-5">
        <h2 class="mb-4">Our Products</h2>
        <div id="product-grid" class="row g-4">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Loading products...</p>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
