<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center py-5">
    <div class="container">
        <div class="card shadow p-5">
            <h1 class="text-success display-4">🎉 Thank You!</h1>
            <p class="lead mt-3">Your order has been placed successfully.</p>
            <p class="text-muted">Order ID: <span id="display-order-id" class="fw-bold"></span></p>
            <a href="index.html" class="btn btn-primary mt-4">Continue Shopping</a>
        </div>
    </div>

    <script>
        // Grab the Order ID from the URL and show it
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('display-order-id').innerText = urlParams.get('orderId');
    </script>
</body>
</html>
